# Production runtime compose.
#
# Prereqs:
#   - Backing services (Postgres, Redis, Logto, Typesense) already running on
#     the network duta-api_default (managed by /opt/duta-api/docker-compose.yml)
#   - .env.prod file present with all required vars (hostnames use container
#     aliases like "postgres", "redis", "logto", "typesense", NOT "localhost")
#   - docker login ghcr.io succeeded with read:packages scope
#
# Usage:
#   docker compose -f infra/docker-compose.yml --env-file .env.prod up -d
#
# Ports bind to 127.0.0.1 only. Nginx is the public entry point.
services:
  api:
    image: ghcr.io/wabiwabo/duta-api:${DUTA_API_TAG:-latest}
    container_name: duta-api-docker
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "127.0.0.1:4001:3001"
    networks:
      - backing
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    stop_grace_period: 30s

  web:
    image: ghcr.io/wabiwabo/duta-web:${DUTA_WEB_TAG:-latest}
    container_name: duta-web-docker
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:4000:3000"
    networks:
      - backing
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    stop_grace_period: 30s

networks:
  backing:
    name: duta-api_default
    external: true
