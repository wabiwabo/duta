# Staging overlay — applied on top of infra/docker-compose.yml
#
# Usage:
#   docker compose -p duta-staging \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.staging.yml \
#     --env-file .env.staging up -d
services:
  api:
    image: ghcr.io/wabiwabo/duta-api:${DUTA_API_TAG:-main}
    container_name: duta-api-staging
    env_file:
      - .env.staging
    ports: !override
      - "127.0.0.1:4011:3001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  web:
    image: ghcr.io/wabiwabo/duta-web:${DUTA_WEB_TAG:-main}
    container_name: duta-web-staging
    env_file:
      - .env.staging
    ports: !override
      - "127.0.0.1:4010:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
